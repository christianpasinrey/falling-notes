<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Falling Notes — nine pieces for a quiet browser</title>
  <meta name="description" content="Satie at dusk, Vivaldi in a storm, and an original dawn — synthesized live in the browser while their notes fall onto a piano." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect x='6' y='1' width='4' height='10' rx='2' fill='%236fb7ff'/><rect x='2' y='12' width='12' height='3' rx='1' fill='%23e8e8ec'/></svg>" />
</head>
<body>
  <canvas id="stage"></canvas>

  <div id="overlay">
    <h1>Falling <span class="accent">Notes</span></h1>
    <p class="subtitle">nine pieces for a quiet browser</p>
    <div id="pieces" role="list"></div>
    <p class="hint">space — pause · r — restart · esc — back</p>
  </div>

  <footer id="caption">
    <span class="left" id="caption-title"></span>
    <span class="right"><span class="dot dot-r"></span> right hand&ensp;<span class="dot dot-l"></span> left hand</span>
  </footer>

  <nav id="controls" aria-label="Player">
    <button id="btn-prev" aria-label="Previous piece" title="previous (←)">
      <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z" fill="currentColor"/></svg>
    </button>
    <button id="btn-play" aria-label="Pause" title="pause (space)">
      <svg class="ic-pause" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M6 5h4v14H6zm8 0h4v14h-4z" fill="currentColor"/></svg>
      <svg class="ic-play" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
    </button>
    <button id="btn-next" aria-label="Next piece" title="next (→)">
      <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><path d="M16 6h2v12h-2zM6 18l8.5-6L6 6z" fill="currentColor"/></svg>
    </button>
  </nav>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
